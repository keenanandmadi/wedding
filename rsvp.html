body {

.title-container h1 {
  font-family: 'Monoton', cursive;
  font-size: 45px;

  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

.title-container .favicon {
  width: 100px;

nav {

nav ul {

nav li {

nav a {
  text-decoration: none;

nav a:hover {

main {

section {
  margin: 20px;

  max-width: 800px;
  width: 100%;
  background: rgba(255, 255, 255, 0.85);
  backdrop-filter: blur(6px);
  border-radius: 12px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.1);
  text-align: center;
}

h2 {
  font-family: 'Montserrat', sans-serif;
  margin-bottom: 20px;
}

/* Toad wrapper */
.toad-wrapper {
  position: relative;
  display: flex;
  justify-content: center;
  margin: 10px 0 20px 0;
}

/* Toad image */
.toad-link-image {
  width: 500px;
  cursor: pointer;
  animation: floatSoft 3s ease-in-out infinite;
  transition: transform 0.2s ease, filter 0.2s ease;
}

/* Subtle float */
@keyframes floatSoft {
  0%   { transform: translateY(0); }
  50%  { transform: translateY(-4px); }
  100% { transform: translateY(0); }
}

/* Hover */
.toad-wrapper:hover .toad-link-image {
  transform: scale(1.05);
  filter: drop-shadow(0 0 8px rgba(178, 143, 211, 0.4));
  animation-play-state: paused;
}

/* Tooltip */
.toad-tooltip {
  position: absolute;
  bottom: -30px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(37, 156, 73, 0.95);
  color: white;
  padding: 5px 9px;
  border-radius: 5px;
  font-size: 12px;
  opacity: 0;
  transition: opacity 0.2s ease;
  white-space: nowrap;
}

.toad-wrapper:hover .toad-tooltip {
  opacity: 1;
}

/* Ripple */
.ripple {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 0;
  height: 0;
  background: rgba(178, 143, 211, 0.25);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}

.toad-wrapper:active .ripple {
  animation: rippleSoft 0.4s ease-out;
}

@keyframes rippleSoft {
  0% {
    width: 0;
    height: 0;
    opacity: 0.4;
  }
  100% {
    width: 160px;
    height: 160px;
    opacity: 0;
  }
}

footer {
  text-align: center;
  padding: 20px;
  background: #259c49;
  color: white;
}
</style>
